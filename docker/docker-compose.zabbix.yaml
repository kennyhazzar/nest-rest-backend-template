name: nest-rest-backend-template-observability

networks:
  backend:
    external: true
    name: ${APP_DOCKER_NETWORK:-nest-rest-backend-template_backend}

volumes:
  zabbix_postgres_data:

services:
  zabbix-postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${ZABBIX_POSTGRES_USER:-zabbix}
      POSTGRES_PASSWORD: ${ZABBIX_POSTGRES_PASSWORD:?ZABBIX_POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${ZABBIX_POSTGRES_DB:-zabbix}
      TZ: ${TZ:-Asia/Novosibirsk}
    volumes:
      - zabbix_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 30
    networks: [backend]

  zabbix-server:
    image: zabbix/zabbix-server-pgsql:alpine-latest
    restart: unless-stopped
    depends_on:
      zabbix-postgres:
        condition: service_healthy
    environment:
      DB_SERVER_HOST: zabbix-postgres
      POSTGRES_USER: ${ZABBIX_POSTGRES_USER:-zabbix}
      POSTGRES_PASSWORD: ${ZABBIX_POSTGRES_PASSWORD:?ZABBIX_POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${ZABBIX_POSTGRES_DB:-zabbix}
      ZBX_CACHESIZE: ${ZBX_CACHESIZE:-128M}
      ZBX_HISTORYCACHESIZE: ${ZBX_HISTORYCACHESIZE:-64M}
      ZBX_TRENDCACHESIZE: ${ZBX_TRENDCACHESIZE:-64M}
      ZBX_VALUECACHESIZE: ${ZBX_VALUECACHESIZE:-64M}
    ports:
      - '127.0.0.1:10051:10051'
    networks: [backend]

  zabbix-web:
    image: zabbix/zabbix-web-nginx-pgsql:alpine-latest
    restart: unless-stopped
    depends_on:
      zabbix-server:
        condition: service_started
      zabbix-postgres:
        condition: service_healthy
    environment:
      ZBX_SERVER_HOST: zabbix-server
      DB_SERVER_HOST: zabbix-postgres
      POSTGRES_USER: ${ZABBIX_POSTGRES_USER:-zabbix}
      POSTGRES_PASSWORD: ${ZABBIX_POSTGRES_PASSWORD:?ZABBIX_POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${ZABBIX_POSTGRES_DB:-zabbix}
      PHP_TZ: ${TZ:-Asia/Novosibirsk}
    ports:
      - '127.0.0.1:8080:8080'
    networks: [backend]

  zabbix-agent2:
    image: zabbix/zabbix-agent2:alpine-latest
    restart: unless-stopped
    depends_on:
      zabbix-server:
        condition: service_started
    privileged: true
    environment:
      ZBX_HOSTNAME: ${ZBX_HOSTNAME:-nest-rest-backend-template-local}
      ZBX_SERVER_HOST: zabbix-server
      ZBX_SERVER_PORT: 10051
      ZBX_ACTIVE_ALLOW: 'true'
      ZBX_PASSIVE_ALLOW: 'true'
      ZBX_PLUGINSDOCKER_ENDPOINT: unix:///var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./logs:/var/log/backend:ro
    ports:
      - '127.0.0.1:10050:10050'
    networks: [backend]
